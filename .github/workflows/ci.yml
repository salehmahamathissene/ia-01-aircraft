name: IA-MDO CI Pipeline

on:
  push:
  pull_request:

jobs:
  test-mdo-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run MDO engine
        run: |
          python main_level3_mdo.py

      - name: Validate structure
        run: |
          python -c "import mdo_core; print('MDO CORE OK')"
